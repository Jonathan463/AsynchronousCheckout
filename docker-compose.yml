version: '3.8'

services:
  postgres:
    image: postgres:17.2-alpine
    container_name: asynchronous-checkout-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-asynchronous-checkout}
      POSTGRES_USER: ${POSTGRES_USER:-asynchronous-checkout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asynchronous-checkout}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asynchronous-checkout -d asynchronous-checkout"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asynchronous-checkout-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: asynchronous-checkout-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - asynchronous-checkout-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: asynchronous-checkout-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Internal + external listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - asynchronous-checkout-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asynchronous-checkout-app
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-asynchronous-checkout}
      DB_USERNAME: ${DB_USERNAME:-asynchronous-checkout}
      DB_PASSWORD: ${DB_PASSWORD:-asynchronous-checkout}

      # Kafka config (important)
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8080:8080"
    networks:
      - asynchronous-checkout-network

volumes:
  postgres_data:

networks:
  asynchronous-checkout-network:
    driver: bridge