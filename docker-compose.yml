version: '3.8'

services:
  postgres:
    image: postgres:17.2-alpine
    container_name: asynchronous-checkout-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-asynchronous-checkout}
      POSTGRES_USER: ${POSTGRES_USER:-asynchronous-checkout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asynchronous-checkout}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asynchronous-checkout -d asynchronous-checkout"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asynchronous-checkout-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asynchronous-checkout-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-asynchronous-checkout}
      DB_USERNAME: ${DB_USERNAME:-asynchronous-checkout}
      DB_PASSWORD: ${DB_PASSWORD:-asynchronous-checkout}
    ports:
      - "8080:8080"
    networks:
      - asynchronous-checkout-network

volumes:
  postgres_data:

networks:
  asynchronous-checkout-network:
    driver: bridge

